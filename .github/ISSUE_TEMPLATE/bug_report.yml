name: Bug 报告
description: 报告可复现的功能、界面、模型连接或打包问题
title: "[Bug] "
labels: [bug]
body:
  - type: dropdown
    id: system
    attributes:
      label: 系统
      options:
        - macOS Apple Silicon
        - Windows x64
        - 开发环境
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SENM 版本
      placeholder: 例如 0.1.0
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 发生了什么，正确结果应该是什么？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: 请按顺序列出操作；不要包含 API Key 或私人素材。
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 可公开的补充信息
      description: 可附脱敏后的输入、Prompt、截图或日志。
